name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or reuse one draft release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const tagName = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `app-v${packageJson.version}`;
            const version = tagName.replace(/^app-v/, '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `PaperQuay v${version}`;
            const releaseBodyTemplate = fs.existsSync('.github/release-notes.md')
              ? fs.readFileSync('.github/release-notes.md', 'utf8')
              : 'Download installers from Assets.';
            const releaseBody = releaseBodyTemplate.replaceAll('{{VERSION}}', version);

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matches = releases
              .filter((release) => release.tag_name === tagName)
              .sort((left, right) => new Date(left.created_at) - new Date(right.created_at));

            let release = matches.find((item) => !item.draft) ?? matches[0];

            if (release) {
              const { data } = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: releaseName,
                body: releaseBody,
                prerelease: false,
                ...(release.draft ? { draft: true } : {}),
              });
              release = data;
            } else {
              const { data } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease: false,
              });
              release = data;
            }

            for (const duplicate of matches) {
              if (duplicate.id !== release.id && duplicate.draft) {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: duplicate.id,
                });
              }
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('tag_name', tagName);
            core.setOutput('version', version);

  build-electron:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: "--win --x64 --publish never"
          - name: Linux x64
            platform: ubuntu-22.04
            args: "--linux --x64 --publish never"
          - name: macOS x64
            platform: macos-latest
            args: "--mac --x64 --publish never"
          - name: macOS arm64
            platform: macos-latest
            args: "--mac --arm64 --publish never"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron package
        run: npm run electron:build -- ${{ matrix.args }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperquay-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        run: |
          shopt -s nullglob
          assets=(
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/latest*.yml
          )

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were generated."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
