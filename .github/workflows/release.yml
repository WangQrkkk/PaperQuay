name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or reuse one draft release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const tagName = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `app-v${packageJson.version}`;
            const version = tagName.replace(/^app-v/, '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `PaperQuay v${version}`;
            const releaseBodyTemplate = fs.existsSync('.github/release-notes.md')
              ? fs.readFileSync('.github/release-notes.md', 'utf8')
              : 'Download installers from Assets.';
            const releaseBody = releaseBodyTemplate.replaceAll('{{VERSION}}', version);

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matches = releases
              .filter((release) => release.tag_name === tagName)
              .sort((left, right) => new Date(left.created_at) - new Date(right.created_at));

            let release = matches.find((item) => !item.draft) ?? matches[0];

            if (release) {
              const { data } = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: releaseName,
                body: releaseBody,
                prerelease: false,
                ...(release.draft ? { draft: true } : {}),
              });
              release = data;
            } else {
              const { data } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease: false,
              });
              release = data;
            }

            for (const duplicate of matches) {
              if (duplicate.id !== release.id && duplicate.draft) {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: duplicate.id,
                });
              }
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('tag_name', tagName);
            core.setOutput('version', version);

  publish-tauri:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
          - name: Windows x64
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
